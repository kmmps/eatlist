  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(235,101,88,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(113,204,151,0.07) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    #phone-shell {
      width: 390px;
      height: 844px;
      position: relative;
      border-radius: 50px;
      overflow: hidden;
      box-shadow:
        0 0 0 10px #1a1a1a,
        0 0 0 12px #2a2a2a,
        0 40px 120px rgba(0,0,0,0.8);
      /* notch simulation via outline trick */
    }

    /* Phone notch */
    #phone-shell::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 30px;
      background: #0d0d0d;
      border-radius: 0 0 20px 20px;
      z-index: 9999;
    }

    #root {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Map overrides */
    .leaflet-control-attribution,
    .leaflet-control-zoom { display: none !important; }

    /* No scrollbar */
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* Tap highlight off */
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
    input { user-select: text; }

    /* Screen label (for verifier) */
    [data-screen-label] { position: absolute; inset: 0; }
  </style>
